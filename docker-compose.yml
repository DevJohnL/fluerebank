services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fluerebank
      POSTGRES_PASSWORD: fluerebank
      POSTGRES_DB: fluerebank
    ports:
      - '5432:5432'
    volumes:
      - fluerebank_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fluerebank -d fluerebank']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fluerebank_pg_data:
